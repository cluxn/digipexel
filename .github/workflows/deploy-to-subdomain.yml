name: Digi Pexel Deployment
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: 📦 Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: 🏗️ Build Statically Exported Frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://digipexel.com/backend/api
          NEXT_PUBLIC_SITE_URL: https://digipexel.com

      - name: 🔧 Install lftp
        run: sudo apt-get install -y lftp

      - name: 🚀 Deploy Static Frontend to Hostinger
        run: |
          lftp -u "u723773599.u723773599,Cluxnftp@12345" \
            -e "set sftp:auto-confirm yes; \
                set net:max-retries 5; \
                set net:reconnect-interval-base 3; \
                mirror --reverse --delete --verbose \
                  ./frontend/out/ public_html/; \
                quit" \
            sftp://cluxn.com || \
          lftp -u "u723773599.u723773599,Cluxnftp@12345" \
            -e "set ftp:ssl-force true; \
                set ssl:verify-certificate false; \
                set ftp:passive-mode true; \
                set net:max-retries 5; \
                mirror --reverse --delete --verbose \
                  ./frontend/out/ public_html/; \
                quit" \
            ftp://cluxn.com

      - name: 🚀 Deploy PHP Backend to Hostinger
        run: |
          lftp -u "u723773599.u723773599,Cluxnftp@12345" \
            -e "set sftp:auto-confirm yes; \
                set net:max-retries 5; \
                set net:reconnect-interval-base 3; \
                mirror --reverse --delete --verbose --exclude 'uploads/' \
                  ./backend/ public_html/backend/; \
                quit" \
            sftp://cluxn.com || \
          lftp -u "u723773599.u723773599,Cluxnftp@12345" \
            -e "set ftp:ssl-force true; \
                set ssl:verify-certificate false; \
                set ftp:passive-mode true; \
                set net:max-retries 5; \
                mirror --reverse --delete --verbose --exclude 'uploads/' \
                  ./backend/ public_html/backend/; \
                quit" \
            ftp://cluxn.com

      - name: 📡 Initialize Database
        run: |
          curl -s --retry 3 https://digipexel.com/backend/init_db.php
          echo "Deployment complete!"
