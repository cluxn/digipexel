name: Digi Pexel Subdomain Deployment
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: 📦 Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: 🏗️ Build Statically Exported Frontend
        run: |
          cd frontend
          npm run build

      - name: 🔧 Install lftp
        run: sudo apt-get install -y lftp

      - name: 🚀 Deploy Static Frontend to Hostinger
        env:
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASS }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" \
            -e "set ftp:ssl-force true; \
                set ssl:verify-certificate false; \
                set ftp:passive-mode true; \
                set net:max-retries 5; \
                set net:reconnect-interval-base 5; \
                mirror --reverse --delete --verbose \
                  ./frontend/out/ public_html/digipexel/; \
                quit" \
            ftp://cluxn.com

      - name: 🚀 Deploy PHP Backend to Hostinger
        env:
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASS }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" \
            -e "set ftp:ssl-force true; \
                set ssl:verify-certificate false; \
                set ftp:passive-mode true; \
                set net:max-retries 5; \
                set net:reconnect-interval-base 5; \
                mirror --reverse --delete --verbose \
                  ./backend/ public_html/digipexel/backend/; \
                quit" \
            ftp://cluxn.com

      - name: 📡 Initialize Database
        run: |
          curl -s --retry 3 https://digipexel.cluxn.com/backend/init_db.php
          echo "Deployment complete!"
